services:
  merchandise-services:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: final
    ports:
      - "8080:80"
      - "5062:82"
    depends_on:
      merchandise-services-db:
        condition: service_healthy
      broker:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      DOTNET_RUNNING_IN_CONTAINER: "true"
      HTTP_PORT: "80"
      GRPC_PORT: "82"
      DB_HOST: "merchandise-services-db"
      DB_PORT: "5432"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      Kafka__Enabled: "true"
      Kafka__BootstrapServers: "broker:29092"
      StockApiGrpcServiceConfiguration__ServerAddress: "http://stock-api:82"
      DatabaseConnectionOptions__ConnectionString: "Host=merchandise-services-db;Port=5432;Database=merchandise-services;Username=postgres;Password=merchandiseServicesPassword"
    volumes:
      - merch-logs:/app/Logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - merch-network
    restart: unless-stopped

  stock-api:
    image: ghcr.io/dzirt089/ozonedu.stockapi:master
    ports:
      - "5070:80"
      - "5072:82"
    environment:
      OTEL_EXPORTER_JAEGER_AGENT_HOST: jaeger
      OTEL_EXPORTER_JAEGER_AGENT_PORT: "6831"
      OTEL_EXPORTER_JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      DatabaseConnectionOptions__ConnectionString: "Host=stock-api-db;Port=5432;Database=stock-api;Username=postgres;Password=stockApiPassword"
    depends_on:
      stock-api-db:
        condition: service_healthy
      jaeger:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      broker:
        condition: service_started
    networks:
      - merch-network
    restart: unless-stopped

  merchandise-services-db:
    image: postgres:16
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: merchandiseServicesPassword
      POSTGRES_DB: merchandise-services
    command: "-c log_statement=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchandise-services"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - merch-network

  stock-api-db:
    image: postgres:16
    ports:
      - "5426:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stockApiPassword
      POSTGRES_DB: stock-api
    command: "-c log_statement=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock-api"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - merch-network

  elasticsearch:
    image: elastic/elasticsearch:7.17.17
    volumes:
      - esdata:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - merch-network

  kibana:
    image: elastic/kibana:7.17.17
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      xpack.security.enabled: "false"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - merch-network
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.1
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    volumes:
      - merch-logs:/logs
      - ./observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    networks:
      - merch-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    ports:
      - "6831:6831/udp"
      - "14268:14268"
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - merch-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      merchandise-services:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - merch-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - merch-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - merch-network
    restart: unless-stopped

  broker:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://broker:29092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT_INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - merch-network
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - broker
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        cub kafka-ready -b broker:29092 1 60 &&
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic stock_replenished_event --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic employee_notification_event --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic email_notification_event --replication-factor 1 --partitions 1
    networks:
      - merch-network

  test-runner:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: test-runner
    depends_on:
      merchandise-services:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      fluent-bit:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Test"
      SERVICE_HTTP_URL: "http://merchandise-services"
      SERVICE_GRPC_URL: "http://merchandise-services:82"
      STOCK_API_GRPC_URL: "http://stock-api:82"
      SERVICE_DB_CONNECTION_STRING: "Host=merchandise-services-db;Port=5432;Database=merchandise-services;Username=postgres;Password=merchandiseServicesPassword"
      KAFKA_BOOTSTRAP_SERVERS: "broker:29092"
      JAEGER_URL: "http://jaeger:16686"
      PROMETHEUS_URL: "http://prometheus:9090"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    entrypoint: ["/bin/bash", "/app/entrypoint.e2e.sh"]
    networks:
      - merch-network
    profiles:
      - test

networks:
  merch-network:
    driver: bridge

volumes:
  esdata:
  grafana-data:
  merch-logs:
  prometheus-data:
