services:
  merchandise-services:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: final
    ports:
      - "8080:80"
      - "5062:82"
    depends_on:
      merchandise-services-db:
        condition: service_healthy
      stock-api:
        condition: service_started
      broker:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
      fluent-bit:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      DOTNET_RUNNING_IN_CONTAINER: "true"
      HTTP_PORT: "80"
      GRPC_PORT: "82"
      DB_HOST: "merchandise-services-db"
      DB_PORT: "5432"
      Telemetry__OtlpEndpoint: "http://otel-collector:4317"
      Kafka__Enabled: "true"
      Kafka__BootstrapServers: "broker:29092"
      StockApiGrpcServiceConfiguration__ServerAddress: "http://stock-api:82"
      DatabaseConnectionOptions__ConnectionString: "Host=merchandise-services-db;Port=5432;Database=merchandise-services;Username=postgres;Password=merchandiseServicesPassword"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - merch-network
    restart: unless-stopped
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: merchandise-service

  stock-api:
    image: ghcr.io/dzirt089/ozonedu.stockapi:master
    ports:
      - "5070:80"
      - "5072:82"
    environment:
      Telemetry__OtlpEndpoint: "http://otel-collector:4317"
      DatabaseConnectionOptions__ConnectionString: "Host=stock-api-db;Port=5432;Database=stock-api;Username=postgres;Password=stockApiPassword"
    depends_on:
      stock-api-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      broker:
        condition: service_started
      fluent-bit:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - merch-network
    restart: unless-stopped
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: stock-api

  merchandise-services-db:
    image: postgres:16
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: merchandiseServicesPassword
      POSTGRES_DB: merchandise-services
    command: "-c log_statement=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchandise-services"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - merch-network

  stock-api-db:
    image: postgres:16
    ports:
      - "5426:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stockApiPassword
      POSTGRES_DB: stock-api
    command: "-c log_statement=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock-api"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - merch-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "54317:4317"
    restart: unless-stopped
    networks:
      - merch-network

  loki:
    image: grafana/loki:3.6.7
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "5310:3100"
    networks:
      - merch-network
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:4.2.3
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    ports:
      - "5240:2020"
      - "24224:24224"
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    networks:
      - merch-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.1
    command: ["-target=all", "-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "5320:3200"
      - "54318:4317"
      - "54319:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - merch-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - merch-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - merch-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - merch-network
    restart: unless-stopped

  broker:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://broker:29092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT_INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - merch-network
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      broker:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -lc
      - |
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic stock_replenished_event --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic employee_notification_event --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic email_notification_event --partitions 1 --replication-factor 1
    networks:
      - merch-network

networks:
  merch-network:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
