[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /logs/log-*.ndjson
    Tag               merchandise.logs
    Parser            json
    DB                /tmp/fluent-bit-merch.db
    Read_from_Head    true
    Refresh_Interval  5
    Skip_Long_Lines   On

[FILTER]
    Name          modify
    Match         merchandise.logs
    Add           service merchandise-service

[OUTPUT]
    Name               es
    Match              merchandise.logs
    Host               elasticsearch
    Port               9200
    Index              merchandise-service-logs
    Logstash_Format    On
    Suppress_Type_Name On
    Replace_Dots       On
