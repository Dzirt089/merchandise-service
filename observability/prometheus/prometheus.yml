global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: merchandise-service
    metrics_path: /metrics
    static_configs:
      - targets: ["merchandise-services:80"]

  - job_name: fluent-bit
    metrics_path: /api/v1/metrics/prometheus
    static_configs:
      - targets: ["fluent-bit:2020"]
